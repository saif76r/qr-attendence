<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{font-family:sans-serif; background:#f0f0f0; padding:20px;}
form{background:#fff;padding:20px;border-radius:10px; width:300px;}
input{display:block;margin:10px 0; padding:8px;width:100%;}
button{padding:10px; background:green;color:white;border:none;border-radius:5px;}
img{margin-top:20px;width:200px;height:200px;}
</style>
</head>
<body>
<h2>Register</h2>
<form method="post">
<input type="text" name="name" placeholder="Name" required>
<input type="text" name="phone" placeholder="Phone" required>
<input type="email" name="email" placeholder="Email" required>
<button type="submit">Register</button>
</form>
{% if message %}<p>{{ message }}</p>{% endif %}
{% if qr_base64 %}<img src="data:image/png;base64,{{ qr_base64 }}" alt="QR Code">{% endif %}
</body>
</html>
